name: Release

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release
        required: true
        type: string

jobs:
  tag:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: [tartelet, "10.0.2.54:5000/tart/macos-tahoe-xcode:v26.6", "memory:4096", "cpu:2"]
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout merged code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - name: Create next patch tag
        id: tag
        env:
          TARGET_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in {1..5}; do
            git fetch --force --tags origin
            latest_tag="$(git tag --list 'v*.*.*' --sort=-version:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n 1 || true)"

            if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "No semantic version tag matching vMAJOR.MINOR.PATCH was found" >&2
              exit 1
            fi

            tag="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
            git tag --annotate "$tag" --message "$tag" "$TARGET_SHA"

            if git push origin "refs/tags/$tag"; then
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git tag --delete "$tag"
            echo "Tag $tag was created concurrently; retrying ($attempt/5)" >&2
          done

          echo "Unable to create a unique patch tag after 5 attempts" >&2
          exit 1

  build:
    needs:
      - tag
    if: >-
      always() &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true)) &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: [tartelet, "10.0.2.54:5000/tart/macos-tahoe-xcode:v26.6", "memory:4096", "cpu:2"]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-tags: true
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && needs.tag.outputs.tag || (github.event_name == 'workflow_dispatch' && inputs.tag || github.ref) }}
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          MERGE_TAG: ${{ needs.tag.outputs.tag }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            tag="$MERGE_TAG"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$MANUAL_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Set up homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Import secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.fwd10.com
          method: token
          token: ${{ secrets.VAULT_TOKEN }}
          extraHeaders: |
            CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
            CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          secrets: |
            store/general connect-api-key | CONNECT_API_KEY ;
            store/general connect-api-key-id | CONNECT_API_KEY_ID ;
            store/general connect-issuer-id | CONNECT_API_ISSUER_ID ;
            store/general certificates-git | CERTIFICATES_GIT ;
            store/general certificates-git | MATCH_GIT_URL ;
            store/general github-key | MATCH_GIT_PRIVATE_KEY ;
            store/general match-password | MATCH_PASSWORD ;
            store/keychain/github-runner name | KEYCHAIN_NAME ;
            store/keychain/github-runner path | KEYCHAIN_PATH ;
            store/keychain/github-runner password | KEYCHAIN_PASSWORD ;
      - name: Create signing keychain
        run: bundle exec fastlane create_profile_keychain
      - name: Install Developer ID certificate
        run: bundle exec fastlane certificates readonly:true
      - name: Run swift build
        run: swift build -c release
      - name: Create builds directory
        run: mkdir -p builds
      - name: Copy executables to builds directory
        run: |
          cp .build/release/tart-executor builds/
          cp .build/release/tart-router builds/
      - name: Sign executables
        run: bundle exec fastlane sign
      - name: Zip tart-executor
        run: zip -j builds/tart-executor.zip builds/tart-executor
      - name: Zip tart-router
        run: zip -j builds/tart-router.zip builds/tart-router
      - name: Notarize executables
        run: bundle exec fastlane notarize_binaries
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: |
            builds/tart-executor.zip
            builds/tart-router.zip
      - name: Update homebrew tart-executor
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: tart-executor
          tag-name: ${{ steps.release.outputs.tag }}
          download-url: https://github.com/bludesign/tart-executor/releases/download/${{ steps.release.outputs.tag }}/tart-executor.zip
          homebrew-tap: bludesign/homebrew-tart
          create-pullrequest: false
          create-branch: false
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
      - name: Update homebrew tart-router
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: tart-router
          tag-name: ${{ steps.release.outputs.tag }}
          download-url: https://github.com/bludesign/tart-executor/releases/download/${{ steps.release.outputs.tag }}/tart-router.zip
          homebrew-tap: bludesign/homebrew-tart
          create-pullrequest: false
          create-branch: false
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
