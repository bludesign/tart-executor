name: Build

on:
  workflow_dispatch:
  pull_request:

jobs:
  build-and-test:
    runs-on: [tartelet, "10.0.2.54:5000/tart/macos-tahoe-xcode:v26.6", "memory:4096", "cpu:2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Build
        run: swift build
      - name: Run unit tests
        run: |
          test_packages=()
          while IFS= read -r manifest; do
            if grep -Eq '\.testTarget[[:space:]]*\(' "$manifest"; then
              test_packages+=("$(dirname "$manifest")")
            fi
          done < <(find . -path './.build' -prune -o -name Package.swift -print)

          if (( ${#test_packages[@]} == 0 )); then
            echo "No unit test targets found"
            exit 0
          fi

          for package in "${test_packages[@]}"; do
            echo "Running unit tests in $package"
            swift test --package-path "$package"
          done
