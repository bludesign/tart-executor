name: SwiftLint

on:
  workflow_dispatch:
  pull_request:

jobs:
  swiftlint:
    runs-on: [tartelet, "10.0.2.54:5000/tart/macos-tahoe-xcode:v26.6", "memory:4096", "cpu:2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Verify embedded OpenAPI spec is up to date
        run: |
          ./scripts/generate-openapi-spec.sh
          git diff --exit-code -- Packages/*/Sources/*/Internal/OpenAPISpec.swift
      - name: Run SwiftLint
        run: swiftlint --quiet --reporter github-actions-logging
