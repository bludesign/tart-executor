openapi: 3.1.0
info:
  title: tart-router management API
  description: >-
    Management & debugging API for a tart-router instance. Exposes job introspection and control,
    the executor (host) fleet and their last-polled status, effective settings, and health.


    When an `apiToken` is configured in `~/tart-router.yaml`, every `/api/v1/*` endpoint except
    `/health`, `/openapi.yaml`, and `/docs` requires an `Authorization: Bearer <token>` header.
  version: 0.24.0
servers:
  - url: /api/v1
    description: Served on the router's listen port (see `port`, e.g. 3251).
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Jobs
  - name: Hosts
  - name: Settings
paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness and version
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
  /status:
    get:
      tags: [Health]
      summary: Router queue and capacity status
      responses:
        "200":
          description: Status snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouterStatusResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /settings:
    get:
      tags: [Settings]
      summary: Effective settings
      responses:
        "200":
          description: The router's effective configuration (no secrets).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouterSettingsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /jobs:
    get:
      tags: [Jobs]
      summary: List tracked jobs
      responses:
        "200":
          description: The jobs currently tracked by the router.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouterJobsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get a single job
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: The job.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouterJobDTO" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /jobs/{id}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel a single job by id
      description: >-
        Drops the job from the router queue. If it was already dispatched to a host, also cancels
        it on that host. Note that executor cancellation is label-granular, so a job sharing an
        identical label set with siblings on the same host may cancel them too.
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: The job was cancelled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CancelResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: No job with that id was tracked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CancelResponse" }
  /jobs/cancel:
    post:
      tags: [Jobs]
      summary: Cancel jobs by label set (fanned out to all hosts)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CancelJobsRequest" }
      responses:
        "200":
          description: The cancel request was fanned out to all hosts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CancelResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /hosts:
    get:
      tags: [Hosts]
      summary: List executors and their last-polled status
      responses:
        "200":
          description: The configured executors.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouterHostsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /hosts/{hostname}:
    get:
      tags: [Hosts]
      summary: Get a single executor
      parameters:
        - name: hostname
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The executor.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouterHostDTO" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /hosts/refresh:
    post:
      tags: [Hosts]
      summary: Force an immediate status re-poll of all executors
      responses:
        "202":
          description: A status refresh was triggered.
        "401": { $ref: "#/components/responses/Unauthorized" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    JobId:
      name: id
      in: path
      required: true
      description: GitHub workflow job id.
      schema: { type: integer }
  responses:
    Unauthorized:
      description: A bearer token is configured and was missing or invalid.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    BadRequest:
      description: The request was malformed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: The resource was not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
    HealthResponse:
      type: object
      required: [status, service, version, startedAt, uptimeSeconds]
      properties:
        status: { type: string }
        service: { type: string }
        version: { type: string }
        startedAt: { type: string, format: date-time }
        uptimeSeconds: { type: number }
    WorkflowAction:
      type: string
      enum: [router_start, waiting, queued, in_progress, completed, unknown]
    TartHostStatus:
      type: object
      required:
        [inProgressJobs, pendingJobs, startedPendingJobs, activeVirtualMachines,
         virtualMachineLimit, cpuLimit, cpuUsed, totalMemory, memoryUsed]
      properties:
        inProgressJobs: { type: integer }
        pendingJobs: { type: integer }
        startedPendingJobs: { type: integer }
        activeVirtualMachines: { type: integer }
        virtualMachineLimit: { type: integer }
        cpuLimit: { type: integer }
        cpuUsed: { type: integer }
        totalMemory: { type: integer }
        memoryUsed: { type: integer }
    RouterStatusResponse:
      type: object
      required:
        [hostname, pendingJobs, pendingJobsUnsent, pendingJobsQueued,
         availableVirtualMachines, availableHosts]
      properties:
        hostname: { type: string }
        pendingJobs: { type: integer }
        pendingJobsUnsent: { type: integer }
        pendingJobsQueued: { type: integer }
        availableVirtualMachines: { type: integer }
        availableHosts: { type: integer }
    RouterHostConfigDTO:
      type: object
      required: [hostname, url, priority]
      properties:
        hostname: { type: string }
        url: { type: string }
        priority: { type: integer }
        cpuLimit: { type: [integer, "null"] }
        memoryLimit: { type: [integer, "null"] }
    RouterSettingsResponse:
      type: object
      required: [hostname, labels, port, authEnabled, hosts]
      properties:
        hostname: { type: string }
        labels:
          type: array
          items: { type: string }
        port: { type: integer }
        loggingEndpoint: { type: [string, "null"] }
        authEnabled:
          type: boolean
          description: Whether a bearer token is configured for this API.
        hosts:
          type: array
          items: { $ref: "#/components/schemas/RouterHostConfigDTO" }
    RouterJobDTO:
      type: object
      required: [id, action, labels, receivedAt]
      properties:
        id: { type: integer }
        action: { $ref: "#/components/schemas/WorkflowAction" }
        labels:
          type: array
          items: { type: string }
        sentToHost:
          type: [string, "null"]
          description: Hostname of the executor this job was dispatched to, if any.
        receivedAt: { type: string, format: date-time }
        sentAt: { type: [string, "null"], format: date-time }
    RouterJobsResponse:
      type: object
      required: [jobs]
      properties:
        jobs:
          type: array
          items: { $ref: "#/components/schemas/RouterJobDTO" }
    RouterHostDTO:
      type: object
      required: [hostname, url, priority, reachable]
      properties:
        hostname: { type: string }
        url: { type: string }
        priority: { type: integer }
        cpuLimit: { type: [integer, "null"] }
        memoryLimit: { type: [integer, "null"] }
        reachable:
          type: boolean
          description: Whether the last status poll of this executor succeeded.
        lastStatus:
          oneOf:
            - { $ref: "#/components/schemas/TartHostStatus" }
            - { type: "null" }
    RouterHostsResponse:
      type: object
      required: [hosts]
      properties:
        hosts:
          type: array
          items: { $ref: "#/components/schemas/RouterHostDTO" }
    CancelJobsRequest:
      type: object
      required: [labels]
      properties:
        labels:
          type: array
          items: { type: string }
          uniqueItems: true
    CancelResponse:
      type: object
      required: [cancelled]
      properties:
        cancelled: { type: boolean }
        cancelledCount: { type: [integer, "null"] }
